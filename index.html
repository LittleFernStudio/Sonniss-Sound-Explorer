  <script>
  document.addEventListener("DOMContentLoaded", () => {
    const tiles = document.querySelectorAll(".tile");

    // Create audio player only while hovering the tile
    tiles.forEach(tile => {
      tile.addEventListener("mouseenter", () => {
        if (tile.querySelector("audio")) return;

        const src = tile.dataset.audioSrc;
        if (!src) return;

        const audio = document.createElement("audio");
        audio.controls = true;
        audio.preload = "metadata";
        audio.src = src;

        tile.appendChild(audio);
      });

      tile.addEventListener("mouseleave", () => {
        const audio = tile.querySelector("audio");
        if (audio) {
          audio.pause();
          audio.remove();
        }
      });
    });

    // Copy full file path to clipboard when clicking the wav filename
    const copyLinks = document.querySelectorAll(".copy-link");
    copyLinks.forEach(link => {
      link.addEventListener("click", async (e) => {
        e.preventDefault();

        const filePath = link.dataset.filepath;
        if (!filePath) return;

        try {
          await navigator.clipboard.writeText(filePath);

          const originalText = link.textContent;
          link.textContent = "Copied!";
          setTimeout(() => {
            link.textContent = originalText;
          }, 1000);
        } catch (err) {
          console.error("Failed to copy file path:", err);
        }
      });
    });

    // Toolbar actions only affect currently visible/hover-created players
    const playAllBtn = document.getElementById("playAll");
    const pauseAllBtn = document.getElementById("pauseAll");
    const stopAllBtn = document.getElementById("stopAll");

    if (playAllBtn) {
      playAllBtn.addEventListener("click", async () => {
        const audios = Array.from(document.querySelectorAll("audio"));
        for (const audio of audios) {
          try {
            audio.currentTime = 0;
            await audio.play();
          } catch (err) {
            console.error("Failed to play audio:", err);
          }
        }
      });
    }

    if (pauseAllBtn) {
      pauseAllBtn.addEventListener("click", () => {
        document.querySelectorAll("audio").forEach(audio => audio.pause());
      });
    }

    if (stopAllBtn) {
      stopAllBtn.addEventListener("click", () => {
        document.querySelectorAll("audio").forEach(audio => {
          audio.pause();
          audio.currentTime = 0;
        });
      });
    }
  });
  </script>
